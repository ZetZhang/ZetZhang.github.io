lude路径，相当于gcc的-l</span></span><br><span class="line"><span class="keyword">link_directories</span>(<span class="variable">$&#123;std_lib_name_INCLUDE_DIRS&#125;</span>) <span class="comment"># 指定动态链接库或静态链接库的路径，相当于gcc的-L</span></span><br><span class="line"><span class="keyword">add_executable</span>(cur_project_name XXX.cpp) <span class="comment"># 指定生成目标</span></span><br><span class="line"><span class="keyword">target_link_libraries</span>(<span class="variable">$&#123;std_lib_name_LIBRARIES&#125;</span>) <span class="comment"># 指定libraries路径，放在add_executable</span></span><br><span class="line"><span class="comment"># ---------- 其他辅助部分 ----------</span></span><br><span class="line"><span class="keyword">function</span>(function_name arg) <span class="comment"># 定义一个函数</span></span><br><span class="line"><span class="keyword">add_subdirectory</span>(dir) <span class="comment"># 添加一个子目录</span></span><br><span class="line">AUS_SOURCE_DIRECTORY(. SRC_LIST) <span class="comment"># 查找当前目录所有文件，保存到SRC_LIST变量中</span></span><br><span class="line"><span class="keyword">FOREACH</span>(one_dir <span class="variable">$&#123;SRC_LIST&#125;</span>)</span><br><span class="line">    <span class="keyword">MESSAGE</span>(<span class="variable">$&#123;one_dir&#125;</span>) <span class="comment"># 使用message进行打印</span></span><br><span class="line"><span class="keyword">ENDFOREACH</span>(onedir)</span><br><span class="line"><span class="comment"># ---------- 判断控制部分 ----------</span></span><br><span class="line"><span class="keyword">if</span>(expression)</span><br><span class="line">    COMMAND1(ARGS)</span><br><span class="line"><span class="keyword">ELSE</span>(expression)</span><br><span class="line">    COMMAND2(ARGS)</span><br><span class="line"><span class="keyword">ENDIF</span>(expression)</span><br><span class="line"><span class="comment"># expression</span></span><br><span class="line"><span class="keyword">IF</span>(var)</span><br><span class="line"><span class="keyword">IF</span>(<span class="keyword">NOT</span> var)</span><br><span class="line"><span class="keyword">IF</span>(var1 <span class="keyword">AND</span> var2)</span><br><span class="line"><span class="keyword">IF</span>(var1 <span class="keyword">OR</span> var2)</span><br><span class="line"><span class="keyword">IF</span>(<span class="keyword">COMMAND</span> cmd)</span><br><span class="line"><span class="keyword">IF</span>(<span class="keyword">EXISTS</span> dir)</span><br><span class="line"><span class="keyword">IF</span>(<span class="keyword">EXISTS</span> <span class="keyword">file</span>)</span><br><span class="line"><span class="keyword">IF</span>(<span class="keyword">IS_DIRECTORY</span> dirname)</span><br><span class="line"><span class="keyword">IF</span>(file1 <span class="keyword">IS_NEWER_THAN</span> file2)</span><br><span class="line"><span class="keyword">IF</span>(variable <span class="keyword">MATCHES</span> regex)</span><br><span class="line"><span class="comment"># range</span></span><br><span class="line"><span class="keyword">WHILE</span>(condition)</span><br><span class="line">    COMMAND1(ARGS)</span><br><span class="line">    // ...</span><br><span class="line"><span class="keyword">ENDWHILE</span>(condition)</span><br><span class="line"><span class="comment"># ---------- CMake基本常用指令 ----------</span></span><br><span class="line"><span class="keyword">ADD_DEFINITIONS</span> <span class="comment"># 为源文件的编译添加由-D引入的宏定义，如add_definitions(-DWin32)</span></span><br><span class="line"><span class="keyword">OPTION</span> <span class="comment"># 提供可以选择的选项，格式为：option(variable "description" initial_value)</span></span><br><span class="line"><span class="keyword">ADD_CUSTOM_COMMAND</span>/<span class="keyword">TARGET</span></span><br><span class="line"><span class="comment"># [COMMAND]：为工程添加自定义的构建规则</span></span><br><span class="line"><span class="comment"># [TARGET]：给指定名称的目标指定执行的命令，目标没有输出文件，并始终被构建</span></span><br><span class="line"><span class="keyword">ADD_DEPENDENCIES</span> <span class="comment"># 添加依赖</span></span><br><span class="line"><span class="keyword">INSTALL</span> <span class="comment"># 用于定义安装规则，安装内容包括目标二进制、动态库、静态库以及文件、目录、脚本</span></span><br><span class="line"><span class="keyword">TARGET_INCLUDE_DIRECTORIES</span> <span class="comment"># target_include_directories(&lt;target&gt;[SYSTEM][BEFORE]&lt;INTERFACE|PUBLIC|PRIVATE&gt;[items])</span></span><br><span class="line"><span class="keyword">SET_TARGET_PROPERTIES</span> <span class="comment"># 设置目标oad属性来改变它们构建的方式</span></span><br><span class="line"><span class="keyword">ENABLE_TESTING</span>/<span class="keyword">ADD_TEST</span></span><br><span class="line"><span class="comment"># [enable_testing]：控制Makefile是否构建test目标</span></span><br><span class="line"><span class="comment"># [add_test]：一般和enable_testing配合使用</span></span><br><span class="line"><span class="comment"># 格式ADD_TEST(testname Exename arg1 arg2 ...)，生成后make test测试</span></span><br><span class="line"><span class="comment"># ---------- CMake基本常用变量 ----------</span></span><br><span class="line">CMAKE_INSTALL_PREFIX <span class="comment"># 构建install的路径</span></span><br><span class="line">$ENV&#123;HOME&#125; <span class="comment"># HOME环境下的目录路径</span></span><br><span class="line">PROJECT_NAME <span class="comment"># 工程名变量</span></span><br><span class="line">&lt;PKG&gt;_INCUDE_DIR <span class="comment"># 导入包头文件全路径</span></span><br><span class="line">&lt;PKG&gt;_LIBRARIES <span class="comment"># 导入库文件的权路径</span></span><br><span class="line">PROJECT_SOURCE_DIR <span class="comment"># 构建工程的全路径</span></span><br><span class="line">CMAKE_VERSION <span class="comment"># Cmake版本号</span></span><br><span class="line">CMAKE_SOURCE_DIR <span class="comment"># 源码树顶层路径</span></span><br></pre></td></tr></table></figure>
